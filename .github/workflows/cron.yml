name: WhatsApp CronJob

on:
  schedule:
    - cron: '0 24 * * *'
  workflow_dispatch:

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Call WhatsApp cron
        run: |
          curl -X GET \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          https://optica-rose.vercel.app/api/cron/whatsapp
